<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ScaleUp packing — калькулятор</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --brand:#006BC6; --brand-d:#004C8C; --strip:#7FB6E6;
    --bg: var(--tg-theme-bg-color,#f4f7fa);
    --card: var(--tg-theme-secondary-bg-color,#ffffff);
    --text: var(--tg-theme-text-color,#15212b);
    --muted: var(--tg-theme-hint-color,#6b7a89);
    --line:#e3e9f0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.4}
  .wrap{max-width:520px;margin:0 auto;padding:14px 14px 130px}
  header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:4px 0 14px}
  header img{height:34px;width:auto;flex:none;display:block;object-fit:contain}
  .lang{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--card)}
  .lang button{border:0;background:transparent;color:var(--muted);font-weight:600;font-size:13px;
    padding:6px 11px;cursor:pointer}
  .lang button.on{background:var(--brand);color:#fff}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
  .card h2{font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin:0 0 12px}
  .row{display:flex;gap:10px}
  .field{flex:1;margin-bottom:11px}
  .field:last-child{margin-bottom:0}
  label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px}
  input[type=number]{width:100%;border:1px solid var(--line);border-radius:10px;background:var(--bg);
    color:var(--text);font-size:17px;font-weight:600;padding:11px 12px;outline:none;-moz-appearance:textfield}
  input[type=number]:focus{border-color:var(--brand)}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .badge{display:flex;align-items:center;gap:10px;margin-top:4px;padding:11px 12px;border-radius:11px;
    background:rgba(0,107,198,.08);border:1px solid rgba(0,107,198,.22)}
  .badge .dot{width:10px;height:10px;border-radius:50%;background:var(--brand);flex:none}
  .badge.warn{background:rgba(214,140,0,.10);border-color:rgba(214,140,0,.30)}
  .badge.warn .dot{background:#d68c00}
  .badge b{font-size:14.5px}
  .badge span{color:var(--muted);font-size:12.5px}
  .opt{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--line)}
  .opt:first-of-type{border-top:0}
  .opt .t{font-size:14px}
  .opt .t small{display:block;color:var(--muted);font-size:12px}
  .opt .px{color:var(--muted);font-size:13px;margin-right:10px}
  .sw{position:relative;width:46px;height:27px;flex:none}
  .sw input{opacity:0;width:0;height:0}
  .sw .sl{position:absolute;inset:0;background:#c7d2dd;border-radius:30px;transition:.15s;cursor:pointer}
  .sw .sl:before{content:"";position:absolute;width:21px;height:21px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
  .sw input:checked + .sl{background:var(--brand)}
  .sw input:checked + .sl:before{transform:translateX(19px)}
  .result{position:fixed;left:0;right:0;bottom:0;background:var(--brand);color:#fff;
    border-radius:18px 18px 0 0;padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    box-shadow:0 -6px 22px rgba(0,0,0,.16);max-width:520px;margin:0 auto}
  .result .liner{display:flex;justify-content:space-between;font-size:13px;opacity:.92;margin-bottom:3px}
  .result .total{display:flex;justify-content:space-between;align-items:baseline;margin-top:6px}
  .result .total .lbl{font-size:13px;opacity:.92}
  .result .total .val{font-size:26px;font-weight:800;letter-spacing:-.01em}
  .result .note{font-size:13px;line-height:1.35}
  .send{display:block;width:100%;margin-top:11px;border:0;border-radius:12px;background:#fff;color:var(--brand-d);
    font-weight:800;font-size:15px;padding:13px;cursor:pointer}
  .hint{color:var(--muted);font-size:11.5px;margin-top:6px}
</style>
</head>

<script>
const CFG={

  anchor:{S:1530,M:2110},

  addon:{vpp:{S:810,M:1460}, mark:{S:240,M:250}, spec:{S:300,M:330}},
  storage:{free:24, mult:3, rate:{S:500,M:700}}

const LEAD_URL="https://script.google.com/macros/s/AKfycbywA4pS6pHGJqPYMf6BzQM2G0q44En0MhjhUgbwp_0fjRvE6_-JqgH989Vy5roaFqweiA/exec"; // <-- сюда вставьте URL веб-приложения Apps Script (см. инструкцию)
const T={

    perUnit:"Цена за единицу",storLine:"Хранение за единицу",batch:"Стоимость партии",

let lang="ru";
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
const $=id=>document.getElementById(id);
const fmt=n=>Math.round(n).toLocaleString("ru-RU").replace(/,/g," ");

function setLang(l){lang=l;$("ru").classList.toggle("on",l==="ru");$("uz").classList.toggle("on",l==="uz");
  document.documentElement.lang=l;renderLabels();calc();}
function renderLabels(){const t=T[lang];document.querySelectorAll("[data-i]").forEach(e=>{e.textContent=t[e.getAttribute("data-i")];});}

function tierK(q){for(const [m,k] of CFG.tiers){if(q>=m)return k;}return CFG.tiers[CFG.tiers.length-1][1];}
function category(maxSide){if(maxSide<=CFG.th.S)return "S";if(maxSide<=CFG.th.M)return "M";return "L";}

let last={};
function calc(){
  const t=T[lang];
  const L=+$("L").value||0,W=+$("W").value||0,H=+$("H").value||0,Q=Math.max(1,+$("Q").value||1);
  const HR=Math.max(0,+$("HR").value||0);
  const maxSide=Math.max(L,W,H);
  const cat=category(maxSide);
  // badge
  const b=$("badge");
  if(cat==="L"){b.classList.add("warn");$("bRukav").textContent=t.indiv;$("bCat").textContent="· "+t.indivCat;}
  else{b.classList.remove("warn");$("bRukav").textContent=cat==="S"?t.r25:t.r50;$("bCat").textContent="· "+(cat==="S"?t.catS:t.catM);}
  // addon price hints (use M if L for display)
  const pc = cat==="L"?"M":cat;
  $("pxVpp").textContent=fmt(CFG.addon.vpp[pc])+" "+t.sum;
  $("pxMark").textContent=fmt(CFG.addon.mark[pc])+" "+t.sum;
  $("pxSpec").textContent=fmt(CFG.addon.spec[pc])+" "+t.sum;

  const res=$("result");
  if(cat==="L"){
    res.innerHTML='<div class="note">'+t.indivNote+'</div><button class="send" onclick="send()">'+t.sendIndiv+'</button>';
    last={lang,L,W,H,qty:Q,hours:HR,maxSide,cat,rukav:t.indiv,individual:true};
    syncMain(t.sendIndiv);return;
  }
  const k=tierK(Q);
  const base=Math.round(CFG.anchor[cat]*k/10)*10;
  let addons=0;
  if($("oVpp").checked)addons+=CFG.addon.vpp[cat];
  if($("oMark").checked)addons+=CFG.addon.mark[cat];
  if($("oSpec").checked)addons+=CFG.addon.spec[cat];
  const perUnit=base+addons;
  const days=Math.max(0,Math.ceil((HR-CFG.storage.free)/24));
  const storUnit=days*CFG.storage.rate[cat]*CFG.storage.mult;
  const batch=(perUnit+storUnit)*Q;
  let html='<div class="liner"><span>'+t.perUnit+'</span><span>'+fmt(perUnit)+' '+t.sum+'</span></div>';
  if(storUnit>0)html+='<div class="liner"><span>'+t.storLine+'</span><span>'+fmt(storUnit)+' '+t.sum+'</span></div>';
  html+='<div class="total"><span class="lbl">'+t.batch+'</span><span class="val">'+fmt(batch)+' '+t.sum+'</span></div>';
  html+='<button class="send" onclick="send()">'+t.send+'</button>';
  res.innerHTML=html;
  last={lang,L,W,H,qty:Q,hours:HR,maxSide,cat,rukav:cat==="S"?t.r25:t.r50,
    perUnit,storUnit,batch,addons:{vpp:$("oVpp").checked,mark:$("oMark").checked,spec:$("oSpec").checked},individual:false};
  syncMain(t.send);
}
function syncMain(text){
  if(!tg)return;
  try{tg.MainButton.setParams({text:text,color:"#006BC6",text_color:"#ffffff",is_visible:true});}catch(e){}
}
function buildText(){
  const t=T[lang],d=last;
  let s="ScaleUp packing — заявка\n";
  s+="Габариты: "+d.L+"×"+d.W+"×"+d.H+" см, тираж "+d.qty+" шт\n";
  s+="Рукав: "+d.rukav+"\n";
  if(d.individual){s+="Класс C — индивидуальный расчёт (>40 см)\n";}
  else{
    s+="Цена за единицу: "+fmt(d.perUnit)+" "+t.sum+"\n";
    if(d.storUnit>0)s+="Хранение/ед: "+fmt(d.storUnit)+" "+t.sum+"\n";
    s+="Стоимость партии: "+fmt(d.batch)+" "+t.sum+"\n";
  }
  if(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user){const u=tg.initDataUnsafe.user;s+="Клиент: "+(u.username?("@"+u.username):(u.first_name||""))+"\n";}
  return s;
}
function send(){
  const t=T[lang];
  const payload=Object.assign({},last);
  if(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user){payload.user=tg.initDataUnsafe.user;}
  if(LEAD_URL){
    try{
      fetch(LEAD_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
      document.getElementById("result").innerHTML='<div class="note">'+t.sent+'</div>';
      if(tg){setTimeout(function(){try{tg.close();}catch(e){}},1300);}
      return;
    }catch(e){}
  }
  const url="https://t.me/share/url?url="+encodeURIComponent("ScaleUp packing")+"&text="+encodeURIComponent(buildText());
  if(tg){tg.openTelegramLink(url);}else{alert(buildText());}
}
["L","W","H","Q","HR"].forEach(id=>$(id).addEventListener("input",calc));
if(tg){try{tg.ready();tg.expand();tg.MainButton.onClick(send);}catch(e){}}
renderLabels();calc();
</script>
</body>
</html>
